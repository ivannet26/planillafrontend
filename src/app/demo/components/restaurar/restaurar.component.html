<p-toast></p-toast>

<p-panel header="Restaurar BD">
  <p-breadcrumb [model]="items"></p-breadcrumb>
</p-panel>

<div class="surface-card shadow-2 border-round-xl px-4 py-4 mt-3">
  <div class="grid gap-3">

    <!-- Seleccionar BD -->
    <div class="col-12 lg:col-6">
  <label class="block mb-2 font-medium">Seleccionar Backup</label>

  <div class="p-inputgroup w-full">

    <input
      pInputText
      type="text"
      [(ngModel)]="backupNombre"
      placeholder="Selecciona tu backup"
      readonly
      class="w-full"
    />

    <button
      pButton
      type="button"
      icon="pi pi-ellipsis-h"
      class="p-button-outlined"
      (click)="abrirSelectorBackup(fileInput)"
      aria-label="Seleccionar backup"
    ></button>
  </div>

  <input
    #fileInput
    type="file"
    accept=".bak"
    style="display:none"
    (change)="onBackupFileChange($event)"
  />
</div>

  </div>

  <div class="flex justify-content-end gap-2 mt-4">
    <button 
    pButton type="button" 
    label="Limpiar" 
    class="p-button-outlined" 
    (click)="limpiar()"
    icon="pi pi-refresh">
    </button>

    <button 
    pButton type="button" 
    label="Restaurar BD" 
    (click)="restaurarBdMock()"
    icon="pi pi-save">
    </button>
  </div>
</div>
