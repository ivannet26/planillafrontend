<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="p-1 py-5 max-h-screen">

  <p-panel header="Configuracion boleta estandar" styleClass="shadow-xl rounded-xl mb-3">
    <p-breadcrumb [model]="items" class="max-w-full"></p-breadcrumb>
  </p-panel>

  <div class="mb-2">
    <div class="shadow-xl rounded-xl surface-card px-4 py-4">

      <div class="grid gap">

        <div class="boleta-toolbar-row">
            <div class="boleta-toolbar-right">
              <button
              pButton
              type="button"
              icon="pi pi-pencil"
              class="p-button-info table-action-btn"
              pTooltip="Editar seleccionado"
              tooltipPosition="bottom"
              (click)="editarSeleccionado()"
              [disabled]="!planillaSelected || isEditMode"></button>
              
              <button
              pButton
              type="button"
              icon="pi pi-trash"
              class="p-button-danger table-action-btn"
              pTooltip="Eliminar seleccionado"
              tooltipPosition="bottom"
              (click)="eliminarSeleccionado()"
              [disabled]="!planillaSelected || isEditMode"></button>
            </div>
          </div>

        <!-- IZQUIERDA -->
         <div class="col-12 lg:col-4">
          
          
          <p-table
          [value]="planillaList"
          dataKey="codigo"
          selectionMode="single"
          [(selection)]="planillaSelected"
          (onRowSelect)="onSelectPlanilla()"
          responsiveLayout="scroll"
          [paginator]="false"
          styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines">
    
          <ng-template pTemplate="header">
            <tr>
              <th style="width: 30%; text-align:center;">Código</th>
              <th style="text-align:center;">Descripción</th>
            </tr>
          </ng-template>
          
          <ng-template pTemplate="body" let-p>
            <tr [pSelectableRow]="p">
              <td style="text-align:center;">{{ p.codigo }}</td>
              <td>{{ p.descripcion }}</td>
            </tr>
          </ng-template>
        </p-table>
      </div>

        <div class="col-12 lg:col-8">

          <div class="surface-ground border-round p-3 right-panel">
            <div class="button-save">
              <button
              *ngIf="isEditMode"
                type="button"
                pButton
                icon="pi pi-save"
                label="Guardar"
                class="p-button-success p-button-sm save-btn"
                [disabled]="!planillaSelected || !isEditMode"
                (click)="guardarMock()"
              ></button>
            </div>


            <div class="conceptos-wrapper">
            <div class="right-grid">
              <div *ngFor="let slot of slots; let i = index">
                <div class="slot-row">
                  <p-dropdown
                  class="slot-code-dd"
                  [options]="conceptoOptions"
                  optionLabel="label"
                  optionValue="value"
                  [(ngModel)]="slot.codigoSeleccionado"
                  (onChange)="onSlotChange(i)"
                  [disabled]="!planillaSelected || !isEditMode"
                  appendTo="body"
                  placeholder="Cód."
                  ></p-dropdown>
                  
                  <input
                  pInputText
                  class="slot-desc"
                  [value]="slot.descripcion"
                  placeholder="Descripción"
                  readonly
                  />
                  
                  <button
                  pButton
                  type="button"
                  class="p-button-rounded p-button-text p-button-sm p-button-danger"
                  pTooltip="Limpiar"
                  [disabled]="!planillaSelected || !isEditMode"
                  (click)="limpiarSlot(i)"
                  ></button>
                </div>
              </div>
            </div>
        </div>

        </div>
    </div> 

      </div>
    </div>
  </div>

</div>
