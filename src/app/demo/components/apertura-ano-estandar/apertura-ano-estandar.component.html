<p-toast></p-toast>

<div class="p-1 py-5 max-h-screen">

  <p-panel header="Apertura de año" styleClass="shadow-xl rounded-xl mb-3">
    <p-breadcrumb [model]="items" class="max-w-full"></p-breadcrumb>
  </p-panel>

  <div class="shadow-xl rounded-xl surface-card px-4 py-4">

    <div class="flex flex-column gap-3" style="max-width: 320px;">
      <div>
        <label class="block mb-1">Año apertura</label>
        <input pInputText type="text" [(ngModel)]="anioApertura" class="w-full p-inputtext-sm" />
      </div>

      <div>
        <label class="block mb-1">Año base</label>
        <input pInputText type="text" [(ngModel)]="anioBase" class="w-full p-inputtext-sm" />
      </div>

      <div class="mt-2">
        <button
          pButton
          type="button"
          label="Guardar"
          icon="pi pi-save"
          class="p-button-success p-button-sm"
          (click)="guardar()">
        </button>
      </div>

      <div class="mt-3" style="color:#d32f2f;">
        <strong>Importante:</strong> Después de aperturar el año, actualice Tablas Paramétricas
      </div>
    </div>

  </div>
</div>
