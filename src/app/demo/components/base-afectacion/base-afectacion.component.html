<div class="base-afectacion-container">
  <!-- Toast para notificaciones -->
  <p-toast></p-toast>

  <!-- Confirm Dialog -->
  <p-confirmDialog></p-confirmDialog>

  <p-panel header="Base de Afectación" styleClass="shadow-xl rounded-xl mb-3">
    <p-breadcrumb [model]="items" class="max-w-full"></p-breadcrumb>
    </p-panel>
    
    <div class="shadow-xl rounded-full surface-card px-4 py-4">
    <div class="base-afectacion-toolbar-row">
  <div class="base-afectacion-toolbar">
    <div class="base-afectacion-toolbar-left">
      <button
        pButton
        type="button"
        icon="pi pi-plus"
        class="p-button-info base-afectacion-btn"
        (click)="agregarNuevo()"
        label="Nueva Base de Afectación"
        pTooltip="Agregar nueva base de afectación"
        tooltipPosition="bottom"
        [disabled]="hayBaseEditando">
      </button>
    </div>

    <div class="base-afectacion-toolbar-right">
      <button
        *ngIf="editingRowIndex === null"
        pButton
        type="button"
        icon="pi pi-pencil"
        class="p-button-info base-afectacion-icon-btn"
        (click)="editarSeleccionado()"
        [disabled]="!selectedBase || hayBaseEditando"
        pTooltip="Editar"
        tooltipPosition="bottom">
      </button>

      <button
        *ngIf="editingRowIndex === null"
        pButton
        type="button"
        icon="pi pi-trash"
        class="p-button-danger base-afectacion-icon-btn"
        (click)="eliminarSeleccionado()"
        [disabled]="!selectedBase || hayBaseEditando"
        pTooltip="Eliminar"
        tooltipPosition="bottom">
      </button>

      <button
        *ngIf="editingRowIndex !== null"
        pButton
        type="button"
        icon="pi pi-check"
        class="p-button-success base-afectacion-icon-btn"
        (click)="guardarSeleccionado()"
        pTooltip="Guardar"
        tooltipPosition="bottom">
      </button>

      <button
        *ngIf="editingRowIndex !== null"
        pButton
        type="button"
        icon="pi pi-times"
        class="p-button-danger base-afectacion-icon-btn"
        (click)="cancelarSeleccionado()"
        pTooltip="Cancelar"
        tooltipPosition="bottom">
      </button>
    </div>
  </div>
</div>

    <p-table
      #dt
      [value]="basesAfectacion"
      [paginator]="true"
      [rows]="10"
      selectionMode="single"
      [(selection)]="selectedBase"
      dataKey="codigo"
      [rowsPerPageOptions]="[5, 10, 20, 50]"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} bases de afectación"
      [globalFilterFields]="['codigo', 'descripcion', 'alias']"
      [tableStyle]="{ 'min-width': '100%' }"
      styleClass="base-afectacion-table p-datatable-sm p-datatable-striped p-datatable-gridlines">

      <!-- Columnas -->
      <ng-template pTemplate="header">
        <tr>
          <th style="width: auto">Codigo</th>
          <th style="width: auto">Descripcion</th>
          <th style="width: auto">Posicion</th>
          <th style="width: auto">Alias</th>
          <th style="width: auto">Activo</th>
          <th style="width: auto">Sunat</th>
        </tr>
      </ng-template>

      <!-- Filas -->
      <ng-template pTemplate="body" let-base let-rowIndex="rowIndex">
        <tr [pSelectableRow]="base">
          <!-- Código -->
          <td>
            <input
              *ngIf="base.isEditing"
              type="text"
              pInputText
              [(ngModel)]="base.codigo"
              [disabled]="!base.isNew"
              class="table-input"
              maxlength="10" />
            <span *ngIf="!base.isEditing">{{ base.codigo }}</span>
          </td>

          <!-- Descripción -->
          <td>
            <input
              *ngIf="base.isEditing"
              type="text"
              pInputText
              [(ngModel)]="base.descripcion"
              class="table-input"
              maxlength="150" />
            <span *ngIf="!base.isEditing">{{ base.descripcion }}</span>
          </td>

          <!-- Posición -->
          <td>
            <input
              *ngIf="base.isEditing"
              type="number"
              pInputText
              [(ngModel)]="base.posicion"
              class="table-input" />
            <span *ngIf="!base.isEditing">{{ base.posicion }}</span>
          </td>

          <!-- Alias -->
          <td>
            <input
              *ngIf="base.isEditing"
              type="text"
              pInputText
              [(ngModel)]="base.alias"
              class="table-input"
              maxlength="50" />
            <span *ngIf="!base.isEditing">{{ base.alias }}</span>
          </td>

          <!-- Activo (checkbox) -->
          <td class="text-center">
            <p-checkbox
              [(ngModel)]="base.activo"
              [binary]="true"
              [disabled]="!base.isEditing"
              inputId="activo-{{rowIndex}}">
            </p-checkbox>
          </td>

          <!-- Sunat (checkbox) -->
          <td class="text-center">
            <p-checkbox
              [(ngModel)]="base.sunat"
              [binary]="true"
              [disabled]="!base.isEditing"
              inputId="sunat-{{rowIndex}}">
            </p-checkbox>
          </td>

        </tr>
      </ng-template>

      <!-- Empty message -->
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center empty-message">
            <i class="pi pi-info-circle"></i>
            <p>No se encontraron bases de afectación</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
    </div>

</div>
