<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-panel header="Periodos Laborales" styleClass="shadow-xl rounded-xl mb-3">

  <div class="periodo-toolbar">
  <div class="periodo-toolbar-left">
    <button
      type="button"
      pButton
      icon="pi pi-plus"
      label="Nuevo Periodo"
      (click)="showAddRow()"
      [disabled]="isEditingAnyRow || esModoVisualizacion"
      class="p-button-sm periodo-btn">
    </button>
  </div>

  <div class="periodo-toolbar-right">
    <button
      *ngIf="editingRowIndex === null"
      pButton
      type="button"
      icon="pi pi-pencil"
      class="p-button-sm periodo-icon-btn"
      pTooltip="Editar"
      tooltipPosition="bottom"
      [disabled]="!periodoSeleccionado || isEditingAnyRow || esModoVisualizacion || isNew"
      (click)="editarPeriodoSeleccionado()">
    </button>

    <button
      *ngIf="editingRowIndex === null"
      pButton
      type="button"
      icon="pi pi-trash"
      class="p-button-sm periodo-icon-btn p-button-danger"
      pTooltip="Eliminar"
      tooltipPosition="bottom"
      [disabled]="!periodoSeleccionado || isEditingAnyRow || esModoVisualizacion || isNew"
      (click)="eliminarPeriodoSeleccionado()">
    </button>

    <button
      *ngIf="editingRowIndex !== null"
      pButton
      type="button"
      icon="pi pi-check"
      class="p-button-sm periodo-icon-btn p-button-success"
      pTooltip="Guardar"
      tooltipPosition="bottom"
      (click)="guardarEdicionSeleccionada()">
    </button>

    <button
      *ngIf="editingRowIndex !== null"
      pButton
      type="button"
      icon="pi pi-times"
      class="p-button-sm periodo-icon-btn p-button-danger"
      pTooltip="Cancelar"
      tooltipPosition="bottom"
      (click)="cancelarEdicionSeleccionada()">
    </button>
  </div>
</div>

  <p-table 
  [value]="periodosLaboralesLista" 
  dataKey="pla30codigo" 
  selectionMode="single"
  [(selection)]="periodoSeleccionado"
  styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 25%;">Fec. Ini</th>
        <th style="width: 25%;">Fec. Fin</th>
        <th style="width: 25%;">Motivo Des.</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-periodo let-ri="rowIndex">
  <tr [pSelectableRow]="periodo">

    <td>
      <ng-container *ngIf="editingRowIndex === ri; else fechaIniVista">
        <p-calendar
          [(ngModel)]="periodosLaboralesLista[ri].pla30fechaini"
          dateFormat="dd/mm/yy"
          class="w-full"
          [appendTo]="'body'">
        </p-calendar>
      </ng-container>

      <ng-template #fechaIniVista>
        {{ periodo.pla30fechaini | date:'dd/MM/yyyy' }}
      </ng-template>
    </td>

    <td>
      <ng-container *ngIf="editingRowIndex === ri; else fechaFinVista">
        <p-calendar
          [(ngModel)]="periodosLaboralesLista[ri].pla30fechafin"
          dateFormat="dd/mm/yy"
          class="w-full"
          [appendTo]="'body'">
        </p-calendar>
      </ng-container>

      <ng-template #fechaFinVista>
        {{ periodo.pla30fechafin | date:'dd/MM/yyyy' }}
      </ng-template>
    </td>

    <td>
      <ng-container *ngIf="editingRowIndex === ri; else motivoVista">
        <div class="flex align-items-center gap-2">
          <input
            type="text"
            pInputText
            [(ngModel)]="periodosLaboralesLista[ri].desmotivocese"
            placeholder="Seleccionar Motivo"
            readonly
            class="w-full" />

          <button
            pButton
            type="button"
            icon="pi pi-search"
            class="p-button-sm p-button-secondary"
            (click)="abrirModalMotivoCese()"
            pTooltip="Seleccionar Motivo">
          </button>
        </div>
      </ng-container>

      <ng-template #motivoVista>
        {{ periodo.desmotivocese }}
      </ng-template>
    </td>

  </tr>
</ng-template>

    <!-- Footer para Nuevo Registro -->
    <ng-template pTemplate="footer">
      <tr *ngIf="isEditing">
        <td colspan="3">
          <form [formGroup]="nuevoPeriodoForm" class="grid p-fluid">

            <div class="col-2" style="width: 25%;">
              <span class="w-full">
                <p-calendar
                formControlName="pla30fechaini"
                dateFormat="dd/mm/yy"
                class="w-full"
                [appendTo]="'body'"
                placeholder="Fecha de Inicio"></p-calendar>
              </span>
            </div>

            <div class="col-2" style="width: 25%;">
              <span class="w-full">
                <p-calendar
                formControlName="pla30fechafin"
                dateFormat="dd/mm/yy"
                class="w-full"
                [appendTo]="'body'"
                placeholder="Fecha de Fin"></p-calendar>
              </span>
            </div>

            <div class="col-2" style="width: 25%; text-align: center;">
              <span class="w-full">
                <p-button
                  label="{{ nuevoPeriodoForm.get('desmotivocese')?.value || 'Seleccionar Motivo' }}"
                  icon="pi pi-search"
                  class="p-button-sm w-full"
                  (click)="abrirModalMotivoCese()"
                ></p-button>
              </span>
            </div>

            <!-- Botones de acción -->
            <div class="col-2" style="width: 25%; text-align: center;">
              <div class="flex gap-2 justify-content-center">
                <p-button icon="pi pi-check"
                styleClass="p-button-success p-button-sm" [text]="true"
                (onClick)="onSave()" pTooltip="Guardar"></p-button>
                <p-button icon="pi pi-times"
                styleClass="p-button-danger p-button-sm" [text]="true"
                (onClick)="onCancel()" pTooltip="Cancelar"></p-button>
              </div>
            </div>
          </form>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-panel>

<!-- Modal motivos de cese -->

<p-dialog [(visible)]="mostrarModalMotivoCese" [header]="'Motivo de Cese'" [modal]="true"
    [style]="{width: '800px'}" [draggable]="false" [closable]="false" [resizable]="false">
    <p-table [value]="motivosCese" [scrollable]="true" scrollHeight="350px" selectionMode="single">
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 30%;">Código</th>
          <th style="width: 70%;">Descripción</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-motivo>
        <tr [pSelectableRow]="motivo" (click)="seleccionarMotivoCese(motivo)" style="cursor: pointer">
          <td>{{ motivo.codigo }}</td>
          <td>{{ motivo.descripcion }}</td>
        </tr>
      </ng-template>
    </p-table>
    <ng-template pTemplate="footer">
      <button pButton type="button" label="Cancelar" icon="pi pi-times" class="p-button-secondary"
        (click)="mostrarModalMotivoCese = false"></button>
    </ng-template>
</p-dialog>
