<p-toast></p-toast>

<div class="p-1 py-5 max-h-screen">

  <p-panel header="Apertura de año" styleClass="shadow-xl rounded-xl mb-3">
    <p-breadcrumb [model]="items" class="max-w-full"></p-breadcrumb>
  </p-panel>

  <div class="shadow-xl rounded-xl surface-card apertura-card">

    <div class="apertura-form">
      <div>
        <label class="apertura-label">Año apertura</label>
        <input pInputText type="text" [(ngModel)]="anioApertura" class="w-full apertura-input" />
      </div>

      <div>
        <label class="apertura-label">Año base</label>
        <input pInputText type="text" [(ngModel)]="anioBase" class="w-full apertura-input" />
      </div>

      <div class="apertura-button-row">
        <button
          pButton
          type="button"
          label="Guardar"
          icon="pi pi-save"
          class="p-button-success p-button-sm apertura-save-btn"
          (click)="guardar()">
        </button>
      </div>

      <div class="apertura-warning">
        <strong>Importante:</strong> Después de aperturar el año, actualice Tablas Paramétricas
      </div>
    </div>
</div>
