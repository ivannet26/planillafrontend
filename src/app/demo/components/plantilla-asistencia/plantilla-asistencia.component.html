<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<p-dialog header="Detalle Plantilla"
[(visible)]="showDetalleModal"
[modal]="true"
[style]="{width: '600px'}"
(onHide)="closeDetalle()"
[draggable]="false">
  <ng-template pTemplate="header">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span>Detalle de Plantilla: {{ selectedPlantilla?.pla20descripcion }}</span>
      <!--<button pButton icon="pi pi-times" (click)="closeDetalle()" class="p-button-text"></button>-->
    </div>
  </ng-template>

  <p-table [value]="plantillaDetalleList" [paginator]="false">
    <ng-template pTemplate="header">
      <tr>
        <th>Columna</th>
        <th>Alias</th>
        <th style="text-align: center;">Estado</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-det let-i="rowIndex">
      <tr>
        <td>{{ det.pla21camponombre }}</td>
        <td>{{ det.pla21campoalias }}</td>
        <td style="text-align: center;">
          <p-checkbox
            [binary]="true"
            [(ngModel)]="det.estado"
            [trueValue]="1"
            [falseValue]="0"
          ></p-checkbox>
        </td>
      </tr>
    </ng-template>
  </p-table>
  <div class="flex justify-content-end mt-3">
    <button pButton type="button" label="Guardar cambios" icon="pi pi-save"
      (click)="guardarEstadosDetalle()" class="p-button-success p-button-sm"></button>
  </div>
</p-dialog>

<div class="container">
  <p-panel header ="Mantenimiento de plantilla" styleClass="shadow-xl rounded-xl mb-3">
    <p-breadcrumb [model]="items" class="max-w-full"></p-breadcrumb>
    </p-panel>
    
    <div class="card">

      <div class="shadow-xl rounded-full surface-card px-4 py-4">
      <div class="plantilla-toolbar-row">
        <div class="plantilla-toolbar">
          <div class="plantilla-toolbar-left">
            <button
            type="button"
            pButton
            icon="pi pi-plus"
            label="Nueva Plantilla"
            (click)="showAddRow()"
            [disabled]="isEditingAnyRow"
            class="p-button-sm plantilla-btn"></button>
          </div>
          
          <div class="plantilla-toolbar-right">
            <button
            *ngIf="editingRowIndex === null"
            pButton
            type="button"
            icon="pi pi-eye"
            class="p-button-info plantilla-icon-btn"
            pTooltip="Ver detalle"
            tooltipPosition="bottom"
            [disabled]="!selectedPlantillaFila || isNew || isEditingAnyRow"
            (click)="verDetalleSeleccionado()"></button>
            
            
            <button
            *ngIf="editingRowIndex === null"
            pButton
            type="button"
            icon="pi pi-pencil"
            class="p-button-info plantilla-icon-btn"
            pTooltip="Editar"
            tooltipPosition="bottom"
            [disabled]="!selectedPlantillaFila || isNew || isEditingAnyRow"
            (click)="editarPlantillaSeleccionada()"></button>
            
            <button
            *ngIf="editingRowIndex === null"
            pButton
            type="button"
            icon="pi pi-trash"
            class="p-button-danger plantilla-icon-btn"
            pTooltip="Eliminar"
            tooltipPosition="bottom"
            [disabled]="!selectedPlantillaFila || isNew || isEditingAnyRow"
            (click)="eliminarPlantillaSeleccionada()"></button>
            
            <button
            *ngIf="editingRowIndex !== null"
            pButton
            type="button"
            icon="pi pi-check"
            class="p-button-success plantilla-icon-btn"
            pTooltip="Guardar"
            tooltipPosition="bottom"
            (click)="guardarEdicionSeleccionada()"></button>
            
            <button
            *ngIf="editingRowIndex !== null"
            pButton
            type="button"
            icon="pi pi-times"
            class="p-button-danger plantilla-icon-btn"
            pTooltip="Cancelar"
            tooltipPosition="bottom"
            (click)="cancelarEdicionSeleccionada()"></button>
          </div>
        </div>
      </div>

      <!-- Tabla Principal -->
      <p-table
        [value]="plantillaAsistenciaList"
        dataKey="pla20plantillacod"
        selectionMode="single"
        [(selection)]="selectedPlantillaFila"
        [paginator]="true"
        [rows]="rowsPerPage"
        responsiveLayout="scroll"
        [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[5, 10, 20, 50]"
        [tableStyle]="{ 'width': '768px' }"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} parámetros"
        styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines"
        class="table-plantilla-asistencia"
        >
          <!-- Cabecera de Tabla -->
          <ng-template pTemplate="header">
              <tr>
                  <th style="text-align: center; width: 40%;">Descripción</th>
                  <th style="text-align: center; width: 20%;">Mod.Usuario</th>
                  <th style="text-align: center; width: 20%;">Reg.Inasistencia</th>
              </tr>
          </ng-template>

          <!-- Cuerpo de Tabla -->
          <ng-template pTemplate="body" let-plantilla let-ri="rowIndex">
  <tr [pSelectableRow]="plantilla">

    <td>
      <div *ngIf="editingRowIndex === ri; else displayDescripcion">
        <input
          type="text"
          pInputText
          [(ngModel)]="editingPlantillaAsistencia!.pla20descripcion"
          class="p-inputtext-sm w-full"
          required />
      </div>
      <ng-template #displayDescripcion>
        {{ plantilla.pla20descripcion }}
      </ng-template>
    </td>

    <td style="text-align: center;">
      <p-checkbox
        [binary]="true"
        [ngModel]="editingRowIndex === ri
          ? editingPlantillaAsistencia!.pla20flagmodifxusuario === 'S'
          : plantilla.pla20flagmodifxusuario === 'S'"
        (onChange)="editingRowIndex === ri && onToggleFlag(editingPlantillaAsistencia!, 'pla20flagmodifxusuario', $event.checked)"
        [disabled]="editingRowIndex !== ri">
      </p-checkbox>
    </td>

    <td style="text-align: center;">
      <p-checkbox
        [binary]="true"
        [ngModel]="editingRowIndex === ri
          ? editingPlantillaAsistencia!.pla20flagregistrainasis === 'S'
          : plantilla.pla20flagregistrainasis === 'S'"
        (onChange)="editingRowIndex === ri && onToggleFlag(editingPlantillaAsistencia!, 'pla20flagregistrainasis', $event.checked)"
        [disabled]="editingRowIndex !== ri">
      </p-checkbox>
    </td>

  </tr>
</ng-template>

          <!-- Footer para Nueva Plantilla-->
          <ng-template pTemplate="footer">
            <tr *ngIf="isEditing">
                <td colspan="3">
                    <form [formGroup]="plantillaAsistenciaForm" class="grid p-fluid">
                        <!-- Descripción -->
                        <div class="col-4" style="width: 40%;">
                            <input pInputText
                                formControlName="pla20descripcion"
                                placeholder="Descripción"
                                class="p-inputtext-sm w-full"/>
                        </div>

                        <!-- Mod.Usuario (formulario) -->
                        <div class="col-2" style="width: 20%; text-align: center;">
                            <p-checkbox [binary]="true" formControlName="pla20flagmodifxusuario"></p-checkbox>
                        </div>

                        <!-- Reg.Inasistencia (formulario) -->
                        <div class="col-2" style="width: 20%; text-align: center;">
                            <p-checkbox [binary]="true" formControlName="pla20flagregistrainasis"></p-checkbox>
                        </div>

                        <!-- Botones de Acción -->
                        <div class="col-2" style="width: 20%;">
                            <div class="flex gap-2 justify-content-center">
                                      <p-button icon="pi pi-check" styleClass="p-button-success p-button-sm" [text]="true"
                                              (onClick)="onSave()" pTooltip="Guardar"></p-button>
                                      <p-button icon="pi pi-times" styleClass="p-button-danger p-button-sm" [text]="true"
                                              (onClick)="onCancel()" pTooltip="Cancelar"></p-button>
                            </div>
                        </div>
                    </form>
                </td>
            </tr>
        </ng-template>
      </p-table>
    </div>
    </div>
</div>
